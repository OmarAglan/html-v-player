<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>HTML5 Custom Video Player</title>
  </head>
  <body class="bg-blue-900 p-4 sm:p-6 md:p-8 lg:p-10">
    <div
      id="container"
      class="w-full sm:w-11/12 md:w-4/5 mx-auto rounded-lg overflow-hidden relative group"
    >
      <!-- VIDEO -->
      <figure class="w-full">
        <video class="w-full">
          <source src="/123.mp4" />
        </video>
      </figure>
      <!-- CONTROLS -->
      <div
        id="controls"
        class="opacity-0 p-2 sm:p-3 md:p-4 lg:p-5 absolute bottom-0 left-0 w-full transition-opacity duration-300 ease-linear group-hover:opacity-100 bg-gradient-to-t from-black/50 to-transparent"
      >
        <!-- PROGRESS BAR -->
        <div id="progress-bar" class="h-1 sm:h-1.5 w-full bg-white cursor-pointer mb-2 sm:mb-3 md:mb-4">
          <div
            id="progress-indicator"
            class="h-full w-9 bg-indigo-800 transition-all duration-500 ease-in-out"
          ></div>
        </div>
        <div class="flex items-center justify-between">
          <div class="flex items-center justify-between space-x-1 sm:space-x-2">
            <!-- REWIND BUTTON -->
            <button
              id="rewind"
              class="transition-all duration-100 ease-linear hover:scale-125 touch-manipulation"
            >
              <i class="material-icons text-white text-2xl sm:text-3xl md:text-4xl w-8 sm:w-10 md:w-12">replay_10</i>
            </button>

            <!-- PLAY BUTTON -->
            <button
              id="play-pause"
              class="transition-all duration-100 ease-linear hover:scale-125 touch-manipulation"
            >
              <i class="material-icons text-white text-3xl sm:text-4xl md:text-5xl inline-block w-8 sm:w-10 md:w-12"
                >play_arrow</i
              >
            </button>

            <!-- FAST FORWARD BUTTON -->
            <button
              id="fast-forward"
              class="transition-all duration-100 ease-linear hover:scale-125 touch-manipulation"
            >
              <i class="material-icons text-white text-2xl sm:text-3xl md:text-4xl w-8 sm:w-10 md:w-12">forward_10</i>
            </button>
          </div>

          <div>
            <!-- VOLUME BUTTON -->
            <button
              id="volume"
              class="transition-all duration-100 ease-linear hover:scale-125 touch-manipulation"
            >
              <i class="material-icons text-white text-2xl sm:text-3xl md:text-4xl">volume_up</i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
