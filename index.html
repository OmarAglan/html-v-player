<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>HTML5 Custom Video Player</title>
  </head>
  <body class="bg-gradient-to-br from-gray-900 via-blue-900 to-gray-900 min-h-screen">
    <!-- Cinema Mode Overlay -->
    <div id="cinema-mode" class="fixed inset-0 bg-black/0 pointer-events-none transition-colors duration-500 z-20"></div>

    <!-- Fixed Header -->
    <header class="fixed top-0 left-0 right-0 text-center py-8 bg-gradient-to-b from-gray-900/95 to-gray-900/80 backdrop-blur-sm z-10">
      <div class="animate-float">
        <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-400 mb-4 tracking-tight">
          Custom Video Player
        </h1>
        <p class="text-blue-200/80 text-base sm:text-lg md:text-xl">
          A beautiful and responsive HTML5 video player with custom controls
        </p>
      </div>
    </header>

    <!-- Main Content -->
    <main class="min-h-screen pt-44 pb-8 px-4 flex items-center justify-center">
      <div class="w-[85vw]">
        <!-- Video Player Container -->
        <div
          id="container"
          class="video-container w-full rounded-xl overflow-hidden relative group"
        >
          <!-- VIDEO -->
          <figure class="w-full aspect-video bg-black video-background">
            <video class="w-full h-full object-contain">
              <source src="/123.mp4" />
            </video>
          </figure>

          <!-- Loading Spinner -->
          <div id="loading-spinner" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <i class="ph ph-spinner-gap text-blue-400 text-6xl animate-spin"></i>
          </div>

          <!-- Error Message -->
          <div id="error-message" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center">
            <i class="ph ph-warning-circle text-red-400 text-6xl mb-3"></i>
            <p class="text-white text-lg bg-black/50 px-4 py-2 rounded-lg backdrop-blur-sm"></p>
          </div>

          <!-- CONTROLS -->
          <div
            id="controls"
            class="controls-overlay opacity-0 p-6 sm:p-7 absolute bottom-0 left-0 w-full transition-opacity duration-300 ease-out group-hover:opacity-100"
          >
            <!-- PROGRESS BAR -->
            <div id="progress-bar" class="progress-bar-container w-full cursor-pointer mb-6">
              <div
                id="progress-indicator"
                class="progress-bar h-full w-0"
              ></div>
            </div>

            <div class="flex items-center justify-between">
              <div class="flex items-center space-x-4 sm:space-x-6">
                <!-- REWIND BUTTON -->
                <button
                  id="rewind"
                  class="control-button p-3 rounded-full hover:bg-white/5"
                >
                  <i class="ph ph-rewind text-white text-3xl sm:text-4xl"></i>
                </button>

                <!-- PLAY BUTTON -->
                <button
                  id="play-pause"
                  class="control-button p-3 rounded-full hover:bg-white/5"
                >
                  <i class="ph ph-play text-white text-4xl sm:text-5xl"></i>
                </button>

                <!-- FAST FORWARD BUTTON -->
                <button
                  id="fast-forward"
                  class="control-button p-3 rounded-full hover:bg-white/5"
                >
                  <i class="ph ph-fast-forward text-white text-3xl sm:text-4xl"></i>
                </button>

                <!-- TIME DISPLAY -->
                <span class="time-display text-base sm:text-lg tracking-wider">
                  <span id="current-time">0:00</span>
                  <span class="mx-1 opacity-60">/</span>
                  <span id="duration">0:00</span>
                </span>
              </div>

              <div class="flex items-center space-x-4 sm:space-x-5">
                <!-- VOLUME CONTROL -->
                <div class="flex items-center group/volume">
                  <button
                    id="volume"
                    class="control-button p-3 rounded-full hover:bg-white/5"
                  >
                    <i class="ph ph-speaker-high text-white text-3xl sm:text-4xl"></i>
                  </button>
                  <!-- Volume Slider -->
                  <div class="volume-slider-container overflow-hidden w-0 group-hover/volume:w-24 transition-all duration-300">
                    <input 
                      type="range" 
                      id="volume-slider" 
                      class="volume-slider w-24 accent-blue-400"
                      min="0" 
                      max="100" 
                      value="100"
                    >
                  </div>
                </div>

                <!-- CINEMA MODE -->
                <button
                  id="cinema-mode-toggle"
                  class="control-button p-3 rounded-full hover:bg-white/5"
                >
                  <i class="ph ph-monitor-play text-white text-3xl sm:text-4xl"></i>
                </button>

                <!-- FULLSCREEN BUTTON -->
                <button
                  id="fullscreen"
                  class="control-button p-3 rounded-full hover:bg-white/5"
                >
                  <i class="ph ph-corners-out text-white text-3xl sm:text-4xl"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
